# ControlBridge configuration.
# Obtain the endpoint URL and token from your controller's admin dashboard.

# WebSocket endpoint of the controller. Use wss:// in production.
controller-url: "wss://your-controller.example/bridge"

# Token issued by the controller; identifies this server. The controller resolves
# all further context from it. Leave empty only for local dev against an
# unauthenticated controller.
auth-token: ""

# Delay before reconnecting after a dropped connection.
reconnect-delay-seconds: 5

# Maximum distance (in blocks) a player may be from an NPC for their chat to
# reach the controller. Chat outside this radius is never sent (cost discipline).
proximity-radius: 16

# Verbose wire-level logging for local debugging. Type-only (never payload or
# player data), but noisy. Leave false on any public server.
debug-wire-logging: false